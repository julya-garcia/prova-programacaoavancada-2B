services:
  user-service:
    build: ./services/user-service
    environment:
      USER_SERVICE_PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo-jwt-em-producao}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-troque-esta-chave-interna-em-producao}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "3001:3001"
    volumes:
      - users-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  auth-service:
    build: ./services/auth-service
    depends_on:
      user-service:
        condition: service_healthy
    environment:
      AUTH_SERVICE_PORT: 3002
      USER_SERVICE_URL: http://user-service:3001
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo-jwt-em-producao}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-troque-esta-chave-interna-em-producao}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  users-data:
